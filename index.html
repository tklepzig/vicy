<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="theme-color" content="#782222" />
    <meta
      name="viewport"
      content="user-scalable=yes, initial-scale=1.0, maximum-scale=10.0, width=device-width"
    />
    <title>Vicy</title>
    <link
      href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600"
      rel="stylesheet"
    />
    <link href="style.min.css" rel="stylesheet" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="favicon.ico" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("sw.js");
        });
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="panel">
        <header></header>
        <article>
          <div class="key-row">
            <input
              class="input"
              id="key"
              type="password"
              autofocus
              placeholder="Key: .*{2,}"
              autocomplete="off"
            />
            <input
              class="input"
              id="key-confirm"
              type="password"
              placeholder="Confirm Key"
              autocomplete="off"
            />
            <span class="key-hint" id="key-hint" hidden></span>
          </div>
          <div class="workspace">
            <div class="tile">
              <header></header>
              <article>
                <textarea
                  id="text"
                  spellcheck="false"
                  autocomplete="off"
                  placeholder="Text: .*{1,}"
                ></textarea>
              </article>
              <footer></footer>
            </div>
            <div class="mode-toggle">
              <div class="compound-commands">
                <div class="spacer"></div>
                <div class="spacer flex"></div>
                <button
                  class="command is-active"
                  id="encrypt-btn"
                  type="button"
                  data-label="Encrypt →"
                  data-abbr="Encrypt"
                ></button>
                <button
                  class="command"
                  id="decrypt-btn"
                  type="button"
                  data-label="← Decrypt"
                  data-abbr="Decrypt"
                ></button>
                <div class="spacer flex"></div>
                <div class="spacer"></div>
                <button
                  class="command"
                  id="copy-btn"
                  type="button"
                  hidden
                >
                  Copy
                </button>
                <div class="spacer"></div>
              </div>
            </div>
            <div class="tile">
              <header></header>
              <article>
                <textarea
                  id="cipher"
                  spellcheck="false"
                  autocomplete="off"
                  placeholder="Cipher"
                ></textarea>
              </article>
              <footer></footer>
            </div>
          </div>
        </article>
        <footer></footer>
      </div>
    </div>

    <script>
      // Hack to allow running the mostly node-targeted js file vigenere.js in the browser
      var exports = {};
    </script>
    <script src="vigenere.js"></script>
    <script>
      const mobileQuery = window.matchMedia("(max-width: 640px)");
      const compoundCommands = document.querySelector(".compound-commands");
      const updateToggleLayout = () =>
        compoundCommands.classList.toggle("vertical", !mobileQuery.matches);
      mobileQuery.addEventListener("change", updateToggleLayout);
      updateToggleLayout();

      const key = document.getElementById("key");
      const keyConfirm = document.getElementById("key-confirm");
      const text = document.getElementById("text");
      const cipher = document.getElementById("cipher");
      const encryptBtn = document.getElementById("encrypt-btn");
      const decryptBtn = document.getElementById("decrypt-btn");
      const keyHint = document.getElementById("key-hint");
      const copyBtn = document.getElementById("copy-btn");

      let mode = "encrypt";
      let keyConfirmBlurred = false;

      // ── Key persistence ──────────────────────────────────────────────────

      const hashKey = async (value) => {
        const buffer = await crypto.subtle.digest(
          "SHA-256",
          new TextEncoder().encode(value)
        );
        return Array.from(new Uint8Array(buffer))
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      };

      const updateFingerprintHint = () => {
        const stored = localStorage.getItem("vicy_key_hash");
        keyConfirm.placeholder = stored
          ? `Confirm Key  •  last: ${stored.slice(0, 8)}`
          : "Confirm Key";
      };

      const persistKey = async (value) => {
        sessionStorage.setItem("vicy_key", value);
        const hash = await hashKey(value);
        localStorage.setItem("vicy_key_hash", hash);
        updateFingerprintHint();
      };

      // On key input: if it matches the stored fingerprint, auto-confirm
      const onKeyInput = async () => {
        const stored = localStorage.getItem("vicy_key_hash");
        if (stored && key.value.length >= 2) {
          const current = await hashKey(key.value);
          if (current === stored) {
            keyConfirm.value = key.value;
            keyConfirmBlurred = true;
          }
        }
        recalculate();
      };

      // ── Core logic ───────────────────────────────────────────────────────

      const setMode = (newMode) => {
        mode = newMode;
        encryptBtn.classList.toggle("is-active", mode === "encrypt");
        decryptBtn.classList.toggle("is-active", mode === "decrypt");
        text.readOnly = mode === "decrypt";
        cipher.readOnly = mode === "encrypt";
        copyBtn.hidden = true;
        recalculate();
      };

      const recalculate = () => {
        const keyValid = isValidKey(key.value, keyConfirm.value);
        if (!keyConfirmBlurred) {
          keyHint.hidden = true;
        } else if (key.value.length < 2) {
          keyHint.textContent = "Key too short (min. 2 chars)";
          keyHint.hidden = false;
        } else if (key.value !== keyConfirm.value) {
          keyHint.textContent = "Keys don't match";
          keyHint.hidden = false;
        } else {
          keyHint.hidden = true;
        }
        encryptBtn.disabled = !keyValid;
        decryptBtn.disabled = !keyValid;
        if (mode === "encrypt") {
          cipher.value =
            keyValid && isValidText(text.value)
              ? encrypt(text.value, key.value)
              : "";
        } else {
          text.value =
            keyValid && isValidText(cipher.value)
              ? decrypt(cipher.value, key.value)
              : "";
        }
        const output = mode === "encrypt" ? cipher : text;
        copyBtn.hidden = output.value.length === 0;
        if (keyValid) persistKey(key.value);
      };

      const copyToClipboard = (button, content) => {
        navigator.clipboard.writeText(content).then(() => {
          button.textContent = "Copied";
          setTimeout(() => (button.textContent = "Copy"), 1500);
        });
      };

      copyBtn.addEventListener("click", () => {
        const output = mode === "encrypt" ? cipher : text;
        copyToClipboard(copyBtn, output.value);
      });

      keyConfirm.addEventListener("blur", () => {
        keyConfirmBlurred = true;
        recalculate();
      });
      encryptBtn.addEventListener("click", () => setMode("encrypt"));
      decryptBtn.addEventListener("click", () => setMode("decrypt"));
      key.addEventListener("input", onKeyInput);
      keyConfirm.addEventListener("input", recalculate);
      text.addEventListener("input", recalculate);
      cipher.addEventListener("input", recalculate);

      // Pre-fill from sessionStorage on load (same-tab reload)
      const sessionKey = sessionStorage.getItem("vicy_key");
      if (sessionKey) {
        key.value = sessionKey;
        keyConfirm.value = sessionKey;
        keyConfirmBlurred = true;
      }

      updateFingerprintHint();
      setMode("encrypt");
    </script>
  </body>
</html>
